<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found — CafeSec Lab</title>
    <meta name="robots" content="noindex">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src 'self'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'"
    >
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)">
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --ink: #111827;
        --muted: #4b5563;
        --line: #d1d5db;
        --panel: #ffffff;
        --accent-strong: #115e59;
        --link: #1d4ed8;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --ink: #e5e7eb;
          --muted: #9aa6b5;
          --line: #2e3b4e;
          --panel: #111827;
          --accent-strong: #2dd4bf;
          --link: #8ab4ff;
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(560px, calc(100% - 40px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 36px;
        text-align: center;
      }

      .mark {
        display: inline-grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-weight: 800;
        color: var(--accent-strong);
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      a {
        color: var(--link);
      }

      a:focus-visible {
        outline: 3px solid var(--accent-strong);
        outline-offset: 2px;
        border-radius: 4px;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="mark" aria-hidden="true">CS</span>
      <h1>Page not found</h1>
      <p>The page you requested does not exist on this site.</p>
      <nav aria-label="Recovery links">
        <a href="https://cafeseclab.com/">Home</a>
        <a href="https://research.cafeseclab.com/">Research notes</a>
        <a href="https://github.com/magnoormeno-dot/netcafe-security-lab">Repository</a>
      </nav>
    </main>
  </body>
</html>
